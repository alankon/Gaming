<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="alankon Gaming">
  <meta name="mobile-web-app-capable" content="yes">
  <title>alankon Gaming | Menu de Jogos</title>
  <link rel="manifest" href="{{ url_for('manifest_file') }}">
  <link rel="icon" href="{{ url_for('static', filename='icons/alankon-gaming-icon.svg') }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ url_for('static', filename='menu.css') }}">
  <script src="{{ url_for('static', filename='platform.js') }}" defer></script>
</head>
<body>
  <main class="menu-shell">
    <section class="hero">
      <p class="tag">alankon gaming</p>
      <h1>Menu de Jogos</h1>
      <p class="subtitle">Escolha o modo e comece agora no navegador.</p>
    </section>

    <section class="games-grid">
      <article class="game-card">
        <h2>1. Git Grid 2048</h2>
        <p>Seu jogo 2048 customizado com tema Git e animacoes.</p>
        <a id="play-2048" class="play-btn" href="{{ url_for('jogo_2048') }}">Jogar 2048</a>
      </article>
      <article class="game-card">
        <h2>2. Aprender Teclas</h2>
        <p>Aperte letras e numeros para ouvir e fixar no teclado.</p>
        <a id="play-keys" class="play-btn" href="{{ url_for('jogo_aprender_teclas') }}">Abrir Jogo Novo</a>
      </article>
    </section>
  </main>
</body>
</html>
